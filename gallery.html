<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>

<!-- Favicon -->
<link rel="icon" href="/favicon.ico">

<!-- Styles -->
<link rel="stylesheet" href="https://use.typekit.net/evr0zre.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="scrollImages.css">
<link rel="stylesheet" href="galleryStyle.css">

<!-- Scripts -->
<script src="script.js" defer></script>
<script src="scroll.js" defer></script>
</head>

<script>
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.querySelector(".lightbox-img");
  const closeBtn = document.querySelector(".lightbox-close");
  const galleryImages = document.querySelectorAll(".image-grid img");

  galleryImages.forEach((img) => {
    img.addEventListener("click", () => {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt || "Fullscreen preview";
      lightbox.classList.add("active");
      lightbox.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    });
  });

  function closeLightbox() {
    lightbox.classList.remove("active");
    lightbox.setAttribute("aria-hidden", "true");
    lightboxImg.src = "";
    document.body.style.overflow = "";
  }

  closeBtn.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && lightbox.classList.contains("active")) {
      closeLightbox();
    }
  });
</script>

<div id="lightbox" class="lightbox" aria-hidden="true">
  <button class="lightbox-close" aria-label="Close preview">&times;</button>
  <img class="lightbox-img" src="" alt="Fullscreen preview">
</div>
