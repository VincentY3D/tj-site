<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeria</title>

  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://use.typekit.net/evr0zre.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="scrollImages.css">
  <link rel="stylesheet" href="galleryStyle.css">

  <script src="script.js" defer></script>
  <script src="scroll.js" defer></script>
</head>
<body>
  <nav>
    <a href="index.html">
      <p style="font-weight: 800;">TEAM JANKOWSKI</p>
    </a>
    <div class="container"></div>
  </nav>

  <section id="gallery" style="margin-top: 4rem;">
    <div class="Grid">
      <h2>Galeria</h2>
      <p>Zbiór naszych realizacji</p>
      <div class="image-grid">
        <img src="img2/1.jpg" id="gImg1" alt="">
        <img src="img2/2.jpg" id="gImg2" alt="">
        <img src="img2/3.jpg" id="gImg3" alt="">
        <img src="img2/4.jpg" id="gImg4" alt="">
        <img src="img2/5.jpg" id="gImg5" alt="">
        <img src="img2/6.jpg" id="gImg6" alt="">
        <img src="img2/7.jpg" id="gImg7" alt="">
        <img src="img2/8.jpg" id="gImg8" alt="">
        <img src="img2/9.jpg" id="gImg9" alt="">
        <img src="img2/10.jpg" id="gImg10" alt="">
        <img src="img2/11.jpg" id="gImg11" alt="">
        <img src="img2/12.jpg" id="gImg12" alt="">
        <img src="img2/13.jpg" id="gImg13" alt="">
        <img src="img2/14.jpg" id="gImg14" alt="">
        <img src="img2/15.jpg" id="gImg15" alt="">
      </div>
    </div>
  </section>

  <section id="footer">
    <footer>
      <hr style="margin: 128px 0; border-color: rgba(0, 0, 0, 0.1); border-left: none;">
      <p>TEAM <br> JANKOWSKI</p>

        © Copyright 2026 TEAM JANKOWSKI - Wykonanie: Y3.DESIGN
      </p>
    </footer>
  </section>

  <!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" aria-hidden="true">
  <button type="button" class="lightbox-close">&times;</button>
  <button type="button" class="lightbox-arrow left">&#10094;</button>
  <img class="lightbox-img" src="" alt="Fullscreen preview">
  <button type="button" class="lightbox-arrow right">&#10095;</button>
</div>
  
<script>
document.addEventListener("DOMContentLoaded", function () {
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.querySelector(".lightbox-img");
  const closeBtn = document.querySelector(".lightbox-close");
  const prevBtn = document.querySelector(".lightbox-arrow.left");
  const nextBtn = document.querySelector(".lightbox-arrow.right");
  const images = Array.from(document.querySelectorAll(".image-grid img"));

  let currentIndex = 0;

  function showImage(index) {
    currentIndex = index;
    lightboxImg.src = images[currentIndex].getAttribute("src");
    lightboxImg.alt = images[currentIndex].getAttribute("alt") || "Fullscreen preview";
  }

  function openLightbox(index) {
    showImage(index);
    lightbox.classList.add("active");
    lightbox.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    lightbox.classList.remove("active");
    lightbox.setAttribute("aria-hidden", "true");
    lightboxImg.src = "";
    document.body.style.overflow = "";
  }

  function showPrevImage(e) {
    if (e) e.stopPropagation();
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage(currentIndex);
  }

  function showNextImage(e) {
    if (e) e.stopPropagation();
    currentIndex = (currentIndex + 1) % images.length;
    showImage(currentIndex);
  }

  images.forEach((img, index) => {
    img.addEventListener("click", function () {
      openLightbox(index);
    });
  });

  closeBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    closeLightbox();
  });

  prevBtn.addEventListener("click", showPrevImage);
  nextBtn.addEventListener("click", showNextImage);

  lightbox.addEventListener("click", function (e) {
    if (e.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener("keydown", function (e) {
    if (!lightbox.classList.contains("active")) return;

    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") showPrevImage();
    if (e.key === "ArrowRight") showNextImage();
  });
});
</script>
</body>
</html>
