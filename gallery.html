<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria</title>

<!-- Favicon -->
<link rel="icon" href="/favicon.ico">

<!-- Styles -->
<link rel="stylesheet" href="https://use.typekit.net/evr0zre.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="scrollImages.css">
<link rel="stylesheet" href="galleryStyle.css">

<!-- Scripts -->
<script src="script.js" defer></script>
<script src="scroll.js" defer></script>
</head>
    
<div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-img" src="" alt="Preview">
</div>

<script>
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.querySelector(".lightbox-img");
const closeBtn = document.querySelector(".lightbox-close");

// Select all gallery images
const images = document.querySelectorAll(".image-grid img");

images.forEach(img => {
    img.addEventListener("click", () => {
        lightbox.style.display = "flex";
        lightboxImg.src = img.src;
    });
});

// Close when clicking X
closeBtn.addEventListener("click", () => {
    lightbox.style.display = "none";
});

// Close when clicking outside image
lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
        lightbox.style.display = "none";
    }
});

// Optional: ESC key closes it
document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
        lightbox.style.display = "none";
    }
});
</script>
    
<body>
    <nav>
        <a href="index.html">
            <p style="font-weight: 800;">TEAM JANKOWSKI</p>
        </a>

        </div>
